<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart — Mobile Store</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/pages.css">
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Modal: Empty cart (SIQ_20) -->
  <div class="modal-overlay" id="emptyCartModal">
    <div class="modal-box">
      
      <h3>Cart is Empty</h3>
      <p>Please add a product to the cart first.</p>
      <button class="btn btn-primary" onclick="closeModal('emptyCartModal')">OK</button>
    </div>
  </div>

  <div class="page-wrapper">

    <nav class="navbar">
      <div class="navbar-inner">
        <a href="home.html" class="navbar-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-5 18a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5-4H7V4h10v12z"/></svg>
          </div>
          <span class="brand-name">Mobile Store</span>
        </a>
        <ul class="navbar-nav">
          <li><a href="home.html" class="nav-link">Home</a></li>
          <li><a href="history.html" class="nav-link">History</a></li>
          <li>
            <a href="cart.html" class="nav-cart">
              <svg viewBox="0 0 24 24"><path d="M1 1h3l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L22 6H6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
              <span class="cart-badge" id="cartCount">0</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">

        <div class="cart-page-header">
          <h1>My Cart</h1>
        </div>

        <div class="cart-layout">
          <!-- Cart Items -->
          <div id="cartItems"></div>

          <!-- Empty state -->
          <div class="empty-state" id="emptyState" style="display:none;">
            Your cart is empty. <a href="home.html">Continue shopping →</a>
          </div>

          <!-- Payment Details strip -->
          <div id="paymentStrip" style="display:none;">
            <div class="payment-summary-strip">
              <div class="ps-header">Payment Details</div>
              <div class="ps-body">
                <div class="ps-total-row">
                  <strong>Total Price</strong>
                  <span id="totalPrice">0 EGP</span>
                </div>
              </div>
            </div>
            <div class="cart-action-row">
              <button class="btn btn-primary" onclick="handleCheckout()">Checkout</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/cart.js"></script>
</body>
</html>
