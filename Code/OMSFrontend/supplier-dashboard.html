<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplier Dashboard — Mobile Store</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="pages.css">
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Modal: Deleted (SIQ_34) -->
  <div class="modal-overlay" id="deletedModal">
    <div class="modal-box">
      
      <h3>Product Deleted</h3>
      <p>Product has been deleted successfully.</p>
      <button class="btn btn-primary" onclick="closeModal('deletedModal')">OK</button>
    </div>
  </div>

  <div class="page-wrapper">

    <div class="top-bar">
      <a href="supplier-dashboard.html" class="top-bar-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24"><path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-5 18a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5-4H7V4h10v12z"/></svg>
        </div>
        <span>Mobile Store</span>
      </a>
      <div class="spacer"></div>
      <button onclick="handleLogout()" class="logout-link" style="background:none; border:none; cursor:pointer;">Logout</button>
    </div>

    <main class="main-content">
      <div class="dashboard-page">

        <h1>Supplier Dashboard</h1>

        <!-- Stats + Create button -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Total Products</div>
            <div class="stat-value" id="totalProducts">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Profit</div>
            <div class="stat-value" id="totalProfit">0 EGP</div>
          </div>
          <div class="spacer"></div>
          <a href="create-product.html" class="btn btn-primary">+ Create Product</a>
        </div>

        <!-- Products Table -->
        <div class="table-wrapper" id="productsWrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Description</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody id="productsBody"></tbody>
          </table>
        </div>
        <!-- Empty state (SIQ_43) -->
        <div class="empty-state" id="noData" style="display:none;">No data available</div>

      </div>
    </main>
  </div>

  <script src="js/supplier-dashboard.js"></script>
</body>
</html>
