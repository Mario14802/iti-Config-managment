<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client History — Mobile Store</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="pages.css">
  <script src="js/api-config.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>
  <div class="page-wrapper">

    <nav class="navbar">
      <div class="navbar-inner">
        <a href="home.html" class="navbar-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-5 18a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5-4H7V4h10v12z"/></svg>
          </div>
          <span class="brand-name">Mobile Store</span>
        </a>
        <ul class="navbar-nav">
          <li><a href="home.html" class="nav-link">Home</a></li>
          <li><a href="history.html" class="nav-link active">History</a></li>
          <li>
            <a href="cart.html" class="nav-cart">
              <svg viewBox="0 0 24 24"><path d="M1 1h3l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L22 6H6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
              <span class="cart-badge" id="cartCount">0</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">

        <div class="history-page-header"><h1>Client History</h1></div>

        <!-- Empty state (SIQ_16) -->
        <div class="empty-state" id="emptyState" style="display:none;">No purchases yet.</div>

        <!-- History Table -->
        <div class="table-wrapper" id="historyWrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Image</th>
                <th>Title</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>

      </div>
    </main>
  </div>

  <script src="js/history.js"></script>
</body>
</html>
