<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment — Mobile Store</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="pages.css">
  <script src="js/api-config.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>

  <!-- Modal: Invalid data -->
  <div class="modal-overlay" id="invalidModal">
    <div class="modal-box">
      
      <h3>Invalid Data</h3>
      <p>invaild data</p>
      <button class="btn btn-primary" onclick="closeModal('invalidModal')">OK</button>
    </div>
  </div>

  <!-- Modal: Order Success (SIQ_26) -->
  <div class="modal-overlay" id="successModal">
    <div class="modal-box">
      
      <h3>Order Placed!</h3>
      <p>You have completed your purchase successfully.</p>
      <a href="history.html" class="btn btn-primary">View My Orders</a>
    </div>
  </div>

  <div class="page-wrapper">

    <nav class="navbar">
      <div class="navbar-inner">
        <a href="home.html" class="navbar-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-5 18a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5-4H7V4h10v12z"/></svg>
          </div>
          <span class="brand-name">Mobile Store</span>
        </a>
        <ul class="navbar-nav">
          <li><a href="home.html" class="nav-link">Home</a></li>
          <li><a href="history.html" class="nav-link">History</a></li>
          <li>
            <a href="cart.html" class="nav-cart">
              <svg viewBox="0 0 24 24"><path d="M1 1h3l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L22 6H6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
              <span class="cart-badge" id="cartCount">0</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">

        <div class="payment-page-header"><h1>Payment Page</h1></div>

        <form onsubmit="event.preventDefault(); placeOrder();"><div class="payment-layout">

          <!-- Delivery Info Form -->
          <div>
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" class="form-control" maxlength="11">
            </div>
            <div class="form-group">
              <label for="city">City</label>
              <select id="city" class="form-control">
                <option value="">Select a city</option>
                <option>Cairo</option>
                <option>Alexandria</option>
                <option>Giza</option>
              </select>
            </div>
            <div class="form-group">
              <label for="address">Full Address</label>
              <textarea id="address" class="form-control" rows="4"></textarea>
            </div>
          </div>

          <!-- Order Summary (SIQ_22) -->
          <div class="order-summary-box">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal">3,000 EGP</span>
            </div>
            <div class="summary-row">
              <span>Delivery Fee</span>
              <span>Free</span>
            </div>
            <div class="summary-row total">
              <span>Order Total</span>
              <span id="orderTotal">3,050 EGP</span>
            </div>
          </div>

        </div>

        <div class="payment-action-row">
          <button type="submit" class="btn btn-primary">Place Order</button>
        </div></form>

      </div>
    </main>
  </div>

  <script src="js/payment.js"></script>
</body>
</html>
