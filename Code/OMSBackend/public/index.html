<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Store - Auth</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
        .container { display: flex; gap: 40px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input { display: block; width: 90%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; width: 90%; border-radius: 4px;}
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; background: #e2e3e5; word-wrap: break-word; white-space: pre-wrap; font-family: monospace; border-radius: 4px; min-height: 50px;}
    </style>
</head>
<body>
    <h1>Mobile Store - Simple Auth Tester</h1>
    <p>Test the rules from your SRS below (e.g. Password must have 1 uppercase and be 8 chars long).</p>
    
    <div class="container">
        <!-- Sign Up Form -->
        <div class="card">
            <h2>Sign Up</h2>
            <input type="text" id="regFirstName" placeholder="First Name (e.g. John)" required>
            <input type="text" id="regLastName" placeholder="Last Name (e.g. Doe)" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPassword" placeholder="Password (e.g. Pass1234)" required>
            <button onclick="register()">Register</button>
        </div>

        <!-- Login Form -->
        <div class="card">
            <h2>Login</h2>
            <input type="email" id="logEmail" placeholder="Email" required>
            <input type="password" id="logPassword" placeholder="Password" required>
            <button onclick="login()">Login</button>
        </div>
    </div>

    <h3>Output from Server:</h3>
    <div class="result" id="output">Waiting for action...</div>

    <script>
        async function register() {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            document.getElementById('output').innerText = "Loading...";

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password, role: 'client' })
                });
                const data = await res.json();
                document.getElementById('output').innerText = "Registration Response:\n" + JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('output').innerText = "Error:\n" + err.message;
            }
        }

        async function login() {
            const email = document.getElementById('logEmail').value;
            const password = document.getElementById('logPassword').value;

            document.getElementById('output').innerText = "Loading...";

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                document.getElementById('output').innerText = "Login Response:\n" + JSON.stringify(data, null, 2);
            } catch (err) {
                document.getElementById('output').innerText = "Error:\n" + err.message;
            }
        }
    </script>
</body>
</html>
